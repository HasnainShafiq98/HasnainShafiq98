name: Generate Snake Animation

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:   # allows manual run from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: HasnainShafiq98
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#7c3aed&color_dots=#1f2937,#5b21b6,#7c3aed,#a78bfa,#ede9fe

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
